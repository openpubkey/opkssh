# Example: opkssh working with the Forgejo Actions provider (e.g. Codeberg).
#
# Builds opkssh from source, installs it as the SSH server verifier inside the
# job container, logs in using the Forgejo Actions OIDC token, and then SSHes
# into localhost with the resulting certificate. A green run plus the final
# `whoami` output ("test") is the proof that the flow works end to end.
#
# This workflow only runs on a Forgejo instance; GitHub ignores .forgejo.
name: Test Forgejo Provider

on:
  push:

# Forgejo equivalent of GitHub's "permissions: id-token: write": makes the
# runner inject ACTIONS_ID_TOKEN_REQUEST_URL / ACTIONS_ID_TOKEN_REQUEST_TOKEN.
enable-openid-connect: true

jobs:
  e2e:
    # Adjust the label to one your instance's runners offer.
    runs-on: ubuntu-latest
    container:
      image: golang:1.26-bookworm
    timeout-minutes: 10
    steps:
      # Manual checkout instead of actions/checkout: JavaScript actions need
      # Node.js inside the container, which the golang image does not ship.
      - name: Checkout
        env:
          TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          HOST="${GITHUB_SERVER_URL#https://}"
          git clone "https://oauth2:${TOKEN}@${HOST}/${GITHUB_REPOSITORY}.git" .
          git checkout "${GITHUB_SHA}"

      - name: Install SSH server
        run: |
          apt-get update -y
          apt-get install -y openssh-server openssh-client sudo jq
          useradd -rm -d /home/test -s /bin/bash test
          # sshd refuses to start unless its privsep dir is 0755.
          mkdir -p /run/sshd
          chown root:root /run/sshd
          chmod 0755 /run/sshd

      - name: Build and install opkssh
        run: |
          go build -v -o opksshbuild
          bash ./scripts/install-linux.sh --install-from=opksshbuild --no-sshd-restart

      - name: Configure server policy
        env:
          TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ISSUER="${GITHUB_SERVER_URL%/}/api/actions"
          echo "$ISSUER forgejo oidc" >> /etc/opk/providers
          # Current Forgejo appends the immutable owner/repo IDs to the sub
          # claim (repo:<owner>-<ownerID>/<repo>-<repoID>:ref:<ref>); older
          # instances use the legacy format. Authorize both.
          REPO_INFO=$(curl -sSf -H "Authorization: token ${TOKEN}" "${GITHUB_SERVER_URL%/}/api/v1/repos/${GITHUB_REPOSITORY}")
          OWNER_ID=$(echo "$REPO_INFO" | jq -r '.owner.id')
          REPO_ID=$(echo "$REPO_INFO" | jq -r '.id')
          opkssh add test "repo:${GITHUB_REPOSITORY_OWNER}-${OWNER_ID}/${GITHUB_REPOSITORY#*/}-${REPO_ID}:ref:${GITHUB_REF}" "$ISSUER"
          opkssh add test "repo:${GITHUB_REPOSITORY}:ref:${GITHUB_REF}" "$ISSUER"

      - name: Start SSH server
        run: /usr/sbin/sshd

      - name: Login with the Forgejo Actions provider
        run: opkssh login forgejo

      - name: SSH into localhost using the opkssh certificate
        run: ssh -o StrictHostKeyChecking=no test@localhost whoami
