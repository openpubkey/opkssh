# /etc/opk/nss.conf — opkssh-nssd configuration
#
# All settings are optional; the defaults shown below are used if the
# file is absent.

# Unix-domain socket the NSS module uses to talk to the daemon.
socket_path = /run/opkssh/nss.sock

# Synthesised UIDs are assigned by hashing the username into this range.
# Choose a range that does not overlap with local or LDAP/AD UIDs.
uid_min     = 60000
uid_max     = 65534

# All JIT users share a single GID.  Create a matching group, e.g.:
#   groupadd --gid 60000 opkssh
gid         = 60000

# Home directory prefix; the user's name is appended automatically.
home_dir    = /home

# Login shell for JIT users.
shell       = /bin/bash

# Path to the auth_id policy file (same file opkssh uses).
auth_id     = /etc/opk/auth_id
