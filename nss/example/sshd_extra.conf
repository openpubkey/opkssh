# Appended to sshd_config for opkssh JIT authentication.

# opkssh verify is invoked as the AuthorizedKeysCommand.
# It validates the OIDC token embedded in the SSH certificate and
# returns an authorized_keys line if the identity is in /etc/opk/auth_id.
AuthorizedKeysCommand /usr/bin/opkssh verify %u %k %t
AuthorizedKeysCommandUser opksshuser

# Certificate-based public-key auth must be on (default, but explicit).
PubkeyAuthentication yes

# Passwords are not used — authentication is purely OIDC-based.
PasswordAuthentication no
KbdInteractiveAuthentication no

# PAM is needed for pam_mkhomedir (creates home dir on first login).
UsePAM yes

# Allow the @-containing email principal to be used as a username.
# OpenSSH passes the literal username to getpwnam(), so no special
# config is needed — but logging it helps debugging.
LogLevel VERBOSE
