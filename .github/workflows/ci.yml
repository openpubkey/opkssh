name: CI

# Runs CI for pull requests and pushes to any branch
# This allows fork developers to get CI feedback on their branches
on:
  pull_request:
    paths:
      - "**.go"
      - "go.mod"
      - "go.sum"
      - "policy/**"
      - "scripts/**"
      - "test/**"
      - ".github/workflows/**"
  push:
    branches:
      - '**'  # Run on all branches
    paths:
      - "**.go"
      - "go.mod"
      - "go.sum"
      - "policy/**"
      - "scripts/**"
      - "test/**"
      - ".github/workflows/**"
  workflow_dispatch:

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  # Check that binary can be built.
  build:
    name: Build
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
    - name: Checkout
      uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
      with:
        persist-credentials: false
    - name: Install Go
      uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
      with:
        go-version-file: 'go.mod'
    - name: Build
      run: go build -v -o /dev/null

  # Check that binary can be built on Windows.
  build-windows:
    name: Build Windows
    runs-on: windows-latest
    timeout-minutes: 5
    steps:
    - name: Checkout
      uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
      with:
        persist-credentials: false
    - name: Install Go
      uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
      with:
        go-version-file: 'go.mod'
    - name: Build Windows AMD64
      shell: pwsh
      run: |
        $env:GOOS = "windows"
        $env:GOARCH = "amd64"
        go build -v -o opkssh-amd64.exe
    - name: Build Windows ARM64
      shell: pwsh
      run: |
        $env:GOOS = "windows"
        $env:GOARCH = "arm64"
        go build -v -o opkssh-arm64.exe
    - name: Test binary works
      shell: pwsh
      run: |
        .\opkssh-amd64.exe --version

  # Run Windows unit tests.
  test-windows:
    name: 'Windows Tests'
    runs-on: windows-latest
    timeout-minutes: 8
    steps:
    - name: Checkout
      uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
      with:
        persist-credentials: false
    - name: Install Go
      uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
      with:
        go-version-file: 'go.mod'
    - name: Run unit tests
      shell: pwsh
      run: go test ./...
    - name: Run Pester tests
      shell: pwsh
      run: Invoke-Pester -Path scripts/windows/test -Output Detailed

  # Keep expensive Windows ARM64 coverage on the upstream repository.
  build-windows-arm64:
    if: github.repository == 'openpubkey/opkssh' && (github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch')
    name: Build Windows ARM64
    runs-on: windows-11-arm
    timeout-minutes: 5
    steps:
    - name: Checkout
      uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
      with:
        persist-credentials: false
    - name: Install Go
      uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
      with:
        go-version-file: 'go.mod'
    - name: Build Windows ARM64
      shell: pwsh
      run: go build -v -o opkssh-arm64.exe
    - name: Test binary works
      shell: pwsh
      run: |
        .\opkssh-arm64.exe --version

  # Keep expensive Windows ARM64 coverage on the upstream repository.
  test-windows-arm64:
    if: github.repository == 'openpubkey/opkssh' && (github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch')
    name: 'Windows ARM64 Tests'
    runs-on: windows-11-arm
    timeout-minutes: 8
    steps:
    - name: Checkout
      uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
      with:
        persist-credentials: false
    - name: Install Go
      uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
      with:
        go-version-file: 'go.mod'
    - name: Run unit tests
      shell: pwsh
      run: go test ./...

  # Run integration tests on x64 for every relevant change.
  test:
    name: 'Integration Tests'
    runs-on: ubuntu-24.04
    timeout-minutes: 8
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu, centos, arch, opensuse]
    env:
      OS_TYPE: ${{ matrix.os }}
    steps:
    - name: Checkout
      uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
      with:
        persist-credentials: false
    - name: Install Go
      uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
      with:
        go-version-file: 'go.mod'
    - name: Install Docker
      uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0
    - name: Run integration tests
      run: go test -tags=integration ./test/integration -timeout=15m -count=1 -parallel=2 -v

  # Keep ARM integration coverage on the upstream repository.
  test-arm:
    if: github.repository == 'openpubkey/opkssh' && (github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch')
    name: 'Integration Tests ARM64'
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 8
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu, centos, opensuse]
    env:
      OS_TYPE: ${{ matrix.os }}
    steps:
    - name: Checkout
      uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
      with:
        persist-credentials: false
    - name: Install Go
      uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
      with:
        go-version-file: 'go.mod'
    - name: Install Docker
      uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0
    - name: Run integration tests
      run: go test -tags=integration ./test/integration -timeout=15m -count=1 -parallel=2 -v

  lint-scripts:
    name: Shell Scripts Lint & Test
    runs-on: ubuntu-24.04
    container:
      image: opensuse/tumbleweed:latest@sha256:3899fe58026bc7425fdcd911826bff6f4846822c91e273fc18a3bfb9a7b973dc
    steps:
    - name: Install packages
      run: |
        zypper refresh
        zypper --non-interactive install --no-recommends git wget ShellCheck shunit2 findutils python313-bashate
    - name: Checkout
      uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
      with:
        persist-credentials: false
    - name: Run ShellCheck
      run: |
        echo "Running ShellCheck on all .sh files under scripts/"
        find scripts/ -type f -name '*.sh' | while read -r file; do
          echo "🔍 Checking $file"
          shellcheck "$file"
        done
    - name: Run shunit2 tests
      run: |
        echo "Running shUnit2 on all .sh files under scripts/test"
        find scripts/test -type f -name '*.sh' | while read -r file; do
          echo "🔍 Checking $file"
          bash "$file"
        done
    - name: Check scripts with bashate
      run: |
        echo "Running bashate on all .sh files under scripts/"
        find scripts/ -type f -name '*.sh' | while read -r file; do
          echo "🔍 Checking $file"
          bashate -i E006 "$file"
        done
    - name: Check wget url pipe
      run: |
        set -euo pipefail

        RAW_URL="https://raw.githubusercontent.com/${GITHUB_REPOSITORY}/${GITHUB_SHA}/scripts/install-linux.sh"
        echo "Testing URL: $RAW_URL"
        set +e
        output=$(wget -qO- "$RAW_URL" | bash 2>&1)
        result=$?
        set -e

        if [[ "$result" -ne 1 ]]; then
          echo "❌ Expected exit code 1 but got $result"
          exit 1
        fi

        if ! grep -q "Error: sudo is not installed. Please install it first" <<< "$output"; then
          echo "❌ Expected error message not found in output"
          exit 1
        fi

        echo "✅ Script behaved as expected when piping to bash"
